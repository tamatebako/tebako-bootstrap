name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: '${{ github.workflow }}-${{ github.event_name }}-${{ github.head_ref || github.ref_name }}'
  cancel-in-progress: true

jobs:
  build-test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest   # linux-gnu-x86_64
          - ubuntu-24.04-arm # linux-gnu-arm64
          - macos-14        # macos-arm64
          - macos-15-intel  # macos-x86_64
          - windows-latest  # windows-x86_64 (MSVC)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        shell: bash
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=ON

      - name: Build
        shell: bash
        run: cmake --build build --config Release

      - name: Self-test
        shell: bash
        run: ctest --test-dir build -C Release --output-on-failure
